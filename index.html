    function WalkinBillingModal({allOrders, onClose, onCheckout}){
      const [selName, setSelName] = useState(null);
      const [disc, setDisc] = useState(0);
      const [gstType, setGstType] = useState('Excluding');
      const [payMode, setPayMode] = useState('Cash');
      const [payStatus, setPayStatus] = useState('Paid');
      const [processing, setProcessing] = useState(false);

      const walkinOrders = allOrders.filter(o => o.checkInId === 'Walk-in' && o.status === 'Active');

      const grouped = walkinOrders.reduce((acc, curr) => {
        const name = curr.roomNo || 'Unknown';
        if (!acc[name]) acc[name] = [];
        acc[name].push(curr);
        return acc;
      }, {});

      const doCheckout = () => {
        if (!selName) return;
        const orders = grouped[selName];
        if (!orders || orders.length === 0) return;
        const orderIds = orders.map(o => o.orderId);

        setProcessing(true);
        Swal.fire({title:'Processing Walk-in Checkout...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});

        const payload = {
          discountPercent: parseFloat(disc) || 0,
          gstType: gstType,
          sgstPercent: 8,
          cgstPercent: 8,
          paymentMode: payMode,
          paymentStatus: payStatus
        };

        google.script.run.withSuccessHandler(res => {
          Swal.close(); setProcessing(false);
          if (res.success) {
            onCheckout(res.invoiceData);
          } else {
            Swal.fire({icon:'error', text: res.message});
          }
        }).withFailureHandler(e => {
          Swal.close(); setProcessing(false);
          Swal.fire({icon:'error', text: e.message});
        }).processWalkinCheckout(selName, orderIds, payload);
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth: '800px', width: '90%'}}>
            <div className="modal-header">
              <h3><i className="fas fa-file-invoice"></i> Walk-in Billing</h3>
              <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body" style={{display: 'flex', gap: '20px', minHeight: '400px'}}>
              {/* Left sidebar: Customer Names */}
              <div style={{flex: '1', borderRight: '1px solid #ddd', paddingRight: '15px'}}>
                <h4 style={{marginBottom: '10px', fontSize: '15px'}}>Customers</h4>
                {Object.keys(grouped).length === 0 ? <p style={{color:'#888', fontSize:'13px'}}>No active walk-in orders.</p> : (
                  <div style={{display:'flex', flexDirection:'column', gap:'5px'}}>
                    {Object.keys(grouped).map(name => (
                      <button key={name} type="button"
                        onClick={() => setSelName(name)}
                        className={`btn ${selName === name ? 'btn-primary' : 'btn-secondary'}`}
                        style={{textAlign: 'left', padding: '8px 12px'}}>
                        <i className="fas fa-user" style={{marginRight: '8px'}}></i> {name}
                        <span style={{float: 'right', background: 'rgba(255,255,255,0.2)', padding: '2px 6px', borderRadius: '10px', fontSize: '11px'}}>{grouped[name].length} items</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* Right side: Items and Checkout options */}
              <div style={{flex: '2', display: 'flex', flexDirection: 'column'}}>
                {!selName ? (
                  <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:'#888'}}>
                    <p>Select a customer from the left to view and bill their order.</p>
                  </div>
                ) : (
                  <>
                    <h4 style={{marginBottom: '10px', fontSize: '15px', color: 'var(--navy-primary)'}}>Order Items for {selName}</h4>
                    <div style={{flex: 1, overflowY: 'auto', marginBottom: '20px'}}>
                      <table className="dash-table">
                        <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>
                        <tbody>
                          {grouped[selName].map((o, idx) => (
                            <tr key={idx}>
                              <td>{o.itemName}</td>
                              <td>{o.quantity}</td>
                              <td>{fmtCur(o.rate)}</td>
                              <td><strong>{fmtCur(o.totalAmount)}</strong></td>
                            </tr>
                          ))}
                        </tbody>
                        <tfoot>
                          <tr>
                            <td colSpan="3" style={{textAlign:'right'}}><strong>Subtotal:</strong></td>
                            <td><strong>{fmtCur(grouped[selName].reduce((sum, o) => sum + (parseFloat(o.totalAmount)||0), 0))}</strong></td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>

                    <div style={{background: '#f8f9fa', padding: '15px', borderRadius: '4px', border: '1px solid #ddd'}}>
                      <h4 style={{marginBottom: '10px', fontSize: '14px'}}><i className="fas fa-calculator"></i> Billing Options</h4>
                      <div className="form-grid" style={{gridTemplateColumns: 'repeat(4, 1fr)', gap: '10px'}}>
                        <div className="form-group" style={{marginBottom:0}}>
                          <label>Discount (%)</label>
                          <input type="number" min="0" max="100" value={disc} onChange={e=>setDisc(e.target.value)} />
                        </div>
                        <div className="form-group" style={{marginBottom:0}}>
                          <label>GST Type</label>
                          <select value={gstType} onChange={e=>setGstType(e.target.value)}>
                            <option>Excluding</option><option>Including</option><option>None</option>
                          </select>
                        </div>
                        <div className="form-group" style={{marginBottom:0}}>
                          <label>Payment Status</label>
                          <select value={payStatus} onChange={e=>setPayStatus(e.target.value)}>
                            <option value="Paid">Paid</option>
                            <option value="Partial">Partial</option>
                            <option value="Credit">Credit</option>
                          </select>
                        </div>
                        <div className="form-group" style={{marginBottom:0}}>
                          <label>Payment Mode</label>
                          <select value={payMode} onChange={e=>setPayMode(e.target.value)} disabled={payStatus === 'Credit'}>
                            <option>Cash</option><option>Card</option><option>Bank Transfer</option><option>UPI</option><option>Online</option>
                          </select>
                        </div>
                      </div>
                      <div className="form-actions" style={{marginTop: '15px'}}>
                        <button type="button" className="btn btn-success" onClick={doCheckout} disabled={processing} style={{width: '100%'}}>
                          {processing ? <><i className="fas fa-spinner fa-spin"></i> Processing...</> : <><i className="fas fa-print"></i> Checkout & Print Bill</>}
                        </button>
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function HotelInvoiceModal({data,onClose}){
      const d=data;
      const [billView, setBillView] = useState('Combined');

      const fmtD=(dt)=>{if(!dt)return'-';const dd=new Date(dt);return dd.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});};
      const fmtDShort=(dt)=>{if(!dt)return'-';const dd=new Date(dt);return dd.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});};
      const n2=(v)=>(parseFloat(v)||0).toFixed(2);
      const cats=['extraBed','foodBev','laundry'];
      const allCatHeaders=['E.Bed','Fds&Bvg','Laundry'];

      // Calculate dynamic active day rows based on view mode
      const activeDayByDay = (d.dayByDay||[]).map(row => {
         const newRow = {...row};
         if (billView === 'Room Only') {
            newRow.foodBev = 0;
         } else if (billView === 'Food Only') {
            newRow.rooms = 0;
            newRow.extraBed = 0;
            newRow.laundry = 0;
         }
         newRow.dayTotal = (parseFloat(newRow.rooms)||0) + cats.reduce((sum, c) => sum + (parseFloat(newRow[c])||0), 0);
         return newRow;
      });

      const colTotals={};cats.forEach(c=>colTotals[c]=0);let totalRoomsCol=0;
      activeDayByDay.forEach(row=>{totalRoomsCol+=row.rooms||0;cats.forEach(c=>colTotals[c]+=row[c]||0);});

      // Live totals
      const liveSubtotal = activeDayByDay.reduce((sum, row) => sum + row.dayTotal, 0);
      const liveDiscount = liveSubtotal * ((parseFloat(d.discountPercent)||0) / 100);
      const afterDiscount = liveSubtotal - liveDiscount;
      let liveSgst = 0, liveCgst = 0;
      if (d.gstType === 'Excluding') {
         liveSgst = afterDiscount * ((parseFloat(d.sgstPercent)||0) / 100);
         liveCgst = afterDiscount * ((parseFloat(d.cgstPercent)||0) / 100);
      }
      const liveBillAmount = afterDiscount + liveSgst + liveCgst;
      const liveAdvance = billView === 'Food Only' ? 0 : (parseFloat(d.advancePaid)||0);
      const liveNetAmount = Math.max(0, liveBillAmount - liveAdvance);


      const planLabel=(fp)=>{if(!fp||fp==='None')return'EP';if(fp.indexOf('Dinner')!==-1)return'MAP';return'CP';};

      const numToWords=(num)=>{
        if(!num||num===0)return'Zero';
        const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
        const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
        num=Math.round(Math.abs(num));
        const w=(n)=>{if(n<20)return ones[n];if(n<100)return tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');if(n<1000)return ones[Math.floor(n/100)]+' Hundred'+(n%100?' '+w(n%100):'');if(n<100000)return w(Math.floor(n/1000))+' Thousand'+(n%1000?' '+w(n%1000):'');if(n<10000000)return w(Math.floor(n/100000))+' Lakh'+(n%100000?' '+w(n%100000):'');return w(Math.floor(n/10000000))+' Crore'+(n%10000000?' '+w(n%10000000):'');};
        return'Rupees '+w(num)+' Only';
      };

      const doPrint=()=>{window.print();};

      const doPdf=()=>{
        const dayRows=(activeDayByDay||[]).map(row=>[fmtDShort(row.date),n2(row.rooms),n2(row.extraBed),n2(row.foodBev),n2(row.laundry),n2(row.dayTotal),'']);
        const totRow=['Totals',n2(totalRoomsCol),...cats.map(c=>n2(colTotals[c])),n2(liveSubtotal),''];
        const doc={pageSize:'A4',pageOrientation:'landscape',pageMargins:[20,20,20,20],content:[
          {text:d.hotelName||'Hill View Eco Retreat',style:'hdr',alignment:'center'},{text:(d.hotelAddress||'')+' | '+(d.hotelPhone||'')+' | '+(d.hotelEmail||''),alignment:'center',fontSize:9,margin:[0,0,0,5]},
          d.hotelTIN?{text:'GSTIN: '+d.hotelTIN,alignment:'center',fontSize:9,margin:[0,0,0,8]}:{text:'',margin:[0,0,0,8]},
          {columns:[{width:'60%',text:[{text:'Guest: ',bold:true},d.guestName+'\n',d.companyName?{text:'Company: '+d.companyName+'\n'}:'',(d.address || d.city || d.state || d.pinCode || d.country)?{text:'Address: '+[d.address, d.city, d.state ? d.state + (d.pinCode ? '-' + d.pinCode : '') : d.pinCode, d.country].filter(Boolean).join(', ')+'\n'}:'',d.gstNumber?{text:'GSTIN: '+d.gstNumber+'\n'}:'',{text:'Mobile: '+(d.mobile||'-')+'\n'}],fontSize:10},{width:'40%',table:{widths:['auto','*'],body:[['Bill No#',d.billNumber||''],['GR No',d.checkInId||''],['Check In',fmtD(d.checkInDate)+' '+d.checkInTime],['Check Out',fmtD(d.checkOutDate)+' '+d.checkOutTime],['Plan',planLabel(d.foodPlan)],['Pax#',(d.pax||1).toString()],['Room#',(d.numberOfRooms||1).toString()]]},fontSize:9}]},
          {text:'\n'},{table:{headerRows:1,widths:['auto','auto','auto','auto','auto','auto','auto'],body:[[{text:'Date',style:'th'},{text:'Rooms',style:'th'},{text:'E.Bed',style:'th'},{text:'Fds&Bvg',style:'th'},{text:'Laundry',style:'th'},{text:'Day Total',style:'th'},{text:'',style:'th'}],...dayRows,totRow.map((v,i)=>i===0?{text:v,bold:true}:{text:v,bold:true})]},fontSize:8},
          {text:'\n'},{columns:[{width:'60%',text:''},{width:'40%',table:{widths:['*','auto'],body:[['Total Amount',{text:n2(liveSubtotal),alignment:'right'}],['Discount ('+n2(d.discountPercent||0)+'%)',{text:'- '+n2(liveDiscount),alignment:'right'}],['SGST '+n2(d.sgstPercent||0)+'%',{text:n2(liveSgst),alignment:'right'}],['CGST '+n2(d.cgstPercent||0)+'%',{text:n2(liveCgst),alignment:'right'}],['Bill Amount',{text:n2(liveBillAmount),alignment:'right',bold:true}],['Less Advance',{text:'- '+n2(liveAdvance),alignment:'right'}],[{text:'Net Amount',bold:true},{text:n2(liveNetAmount),alignment:'right',bold:true,fontSize:12}]]},fontSize:10}]},
          {text:'\nRooms: '+(d.roomNumbers||''),fontSize:9,margin:[0,5,0,0]},{text:numToWords(liveBillAmount),italics:true,fontSize:10,margin:[0,5,0,20]},
          {columns:[{text:'Guest\'s Signature\n_______________',alignment:'center',fontSize:9},{text:'PLEASE DEPOSIT YOUR KEY',alignment:'center',fontSize:9,bold:true},{text:'Admin / Front Office\n_______________',alignment:'center',fontSize:9}]}
        ],styles:{hdr:{fontSize:18,bold:true,color:'#001f3f'},th:{bold:true,fontSize:8,color:'white',fillColor:'#001f3f',alignment:'center'}},defaultStyle:{fontSize:10}};
        pdfMake.createPdf(doc).download('Invoice-'+(d.billNumber||d.checkInId)+'-'+billView.replace(/\s+/g,'')+'.pdf');
      };

      return(<div className="modal-overlay" onClick={onClose}><div className="modal" style={{maxWidth:'1050px',width:'95%'}} onClick={e=>e.stopPropagation()}><div className="modal-header no-print"><div style={{display:'flex',alignItems:'center',gap:'15px'}}><h3><i className="fas fa-file-invoice"></i> Hotel Invoice</h3><select value={billView} onChange={e=>setBillView(e.target.value)} style={{padding:'5px',borderRadius:'4px',border:'1px solid #ccc',fontSize:'14px'}}><option>Combined</option><option>Room Only</option><option>Food Only</option></select></div><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div><div className="modal-body" style={{padding:'15px'}}>
        <div className="hotel-invoice">
          <div className="hotel-invoice-header">
            {d.hotelLogo&&<img src={d.hotelLogo} className="hotel-logo" alt="Logo"/>}
            <div className="hotel-info"><h2>{d.hotelName||'Hill View Eco Retreat'}</h2><p>{d.hotelAddress||''}</p><p>{d.hotelPhone?'Ph: '+d.hotelPhone:''} {d.hotelEmail?' | '+d.hotelEmail:''}</p>{d.hotelTIN&&<p>GSTIN: {d.hotelTIN}</p>}</div>
            <div style={{width:'60px'}}></div>
          </div>
          <div className="invoice-meta-section">
            <div className="invoice-guest-details">
              <p><strong>Guest:</strong> {d.guestName}</p>
              {d.companyName&&<p><strong>Company:</strong> {d.companyName}</p>}
              {(d.address || d.city || d.state || d.pinCode || d.country) && <p><strong>Address:</strong> {[d.address, d.city, d.state ? d.state + (d.pinCode ? '-' + d.pinCode : '') : d.pinCode, d.country].filter(Boolean).join(', ')}</p>}
              {d.gstNumber&&<p><strong>GSTIN:</strong> {d.gstNumber}</p>}
              <p><strong>Mobile:</strong> {d.mobile||'-'}</p>
              {d.email&&<p><strong>Email:</strong> {d.email}</p>}
              <p><strong>Bill To:</strong> {d.billTo||'Individual'}</p>
            </div>
            <div className="invoice-bill-info"><table><tbody>
              <tr><td>Bill No#</td><td>{d.billNumber||'-'}</td></tr>
              <tr><td>GR No</td><td>{d.checkInId||'-'}</td></tr>
              <tr><td>Check In</td><td>{fmtD(d.checkInDate)} {d.checkInTime||''}</td></tr>
              <tr><td>Check Out</td><td>{fmtD(d.checkOutDate)} {d.checkOutTime||''}</td></tr>
              <tr><td>Plan</td><td>{planLabel(d.foodPlan)}</td></tr>
              <tr><td>Pax#</td><td>{d.pax||1}</td></tr>
              <tr><td>Room#</td><td>{d.numberOfRooms||1}</td></tr>
            </tbody></table></div>
          </div>
          <table className="invoice-day-table"><thead><tr><th>Date</th><th>Rooms</th>{allCatHeaders.map(h=><th key={h}>{h}</th>)}<th>Days Total</th><th>Gr.Total</th></tr></thead>
            <tbody>{activeDayByDay.map((row,i)=><tr key={i}><td style={{textAlign:'center'}}>{fmtDShort(row.date)}</td><td>{n2(row.rooms)}</td><td>{n2(row.extraBed)}</td><td>{n2(row.foodBev)}</td><td>{n2(row.laundry)}</td><td><strong>{n2(row.dayTotal)}</strong></td><td><strong></strong></td></tr>)}</tbody>
            <tfoot><tr><td style={{textAlign:'center'}}><strong>Totals</strong></td><td><strong>{n2(totalRoomsCol)}</strong></td>{cats.map(c=><td key={c}><strong>{n2(colTotals[c])}</strong></td>)}<td><strong>{n2(liveSubtotal)}</strong></td><td></td></tr></tfoot>
          </table>
          <table className="invoice-totals-table"><tbody>
            <tr><td>Total Amount</td><td>{n2(liveSubtotal)}</td></tr>
            {liveDiscount>0&&<tr><td>Discount ({n2(d.discountPercent||0)}%)</td><td>- {n2(liveDiscount)}</td></tr>}
            <tr><td>SGST {n2(d.sgstPercent||0)}%</td><td>{n2(liveSgst)}</td></tr>
            <tr><td>CGST {n2(d.cgstPercent||0)}%</td><td>{n2(liveCgst)}</td></tr>
            <tr><td>Bill Amount</td><td>{n2(liveBillAmount)}</td></tr>
            {liveAdvance>0&&<tr><td>Less Advance</td><td>- {n2(liveAdvance)}</td></tr>}
            <tr><td>Net Amount</td><td>{n2(liveNetAmount)}</td></tr>
          </tbody></table>
          <div className="invoice-footer">
            <p>Linked Rooms: {d.roomNumbers||'-'}</p>
            <p className="amount-words">{numToWords(liveBillAmount)}</p>
            <div className="invoice-signatures"><div>Guest's Signature</div><div>PLEASE DEPOSIT YOUR KEY</div><div>Admin / Front Office InCharge</div></div>
          </div>
        </div>
        <div className="preview-actions no-print"><button className="btn btn-primary" onClick={doPrint}><i className="fas fa-print"></i> Print</button><button className="btn btn-success" onClick={doPdf}><i className="fas fa-download"></i> Download PDF</button><button className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Close</button></div>
      </div></div></div>);
    }

    function CheckoutView({user}){
      const [activeRooms, setActiveRooms] = useState([]);
      const [fetching,setFetching]=useState(false);
      
      const [queuedCis, setQueuedCis] = useState([]);
      const [primaryCiId, setPrimaryCiId] = useState(null);
      const [foodOrdersMap, setFoodOrdersMap] = useState({}); // { checkInId: [orders] }
      
      // Fine-grained selection tracking
      const [selectedRoomsMap, setSelectedRoomsMap] = useState({}); // { checkInId: [roomNos] }
      const [selectedOrdersMap, setSelectedOrdersMap] = useState({}); // { checkInId: [orderIds] }

      const [inv,setInv]=useState(null);
      const [saving,setSaving]=useState(false);
      const [payMode,setPayMode]=useState('Cash');
      const [payStatus,setPayStatus]=useState('Paid');
      const [amtPaid,setAmtPaid]=useState('');
      const [checkOutDate,setCheckOutDate]=useState(() => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); });
      const [checkOutTime,setCheckOutTime]=useState('12:00');
      const [discountPercent,setDiscountPercent]=useState(0);
      const [advanceToApply,setAdvanceToApply]=useState(0);
      const [mg, setMg] = useState({ guestName:'', companyName:'', gstNumber:'', mobile:'', email:'', address:'', city:'', state:'', pinCode:'', country:'', gstType:'Excluding', billTo:'Individual', extraPerson: 0 });

      useEffect(()=>{
        google.script.run.withSuccessHandler(r=>{setActiveRooms(Array.isArray(r)?r:[]);}).withFailureHandler(()=>{}).getActiveCheckInRooms();
      },[]);

      const fetchRoom=(selectedRoomNo)=>{
        if(!selectedRoomNo){Swal.fire({icon:'warning',text:'Select a room.'});return;}
        setFetching(true);
        
        google.script.run.withSuccessHandler(res=>{
          if(res){
            if (queuedCis.find(ci => ci.checkInId === res.checkInId)) {
              setFetching(false);
              Swal.fire({icon:'info', title:'Already Queued', text:'This check-in is already in the checkout queue.'});
              return;
            }

            if (queuedCis.length === 0) {
               setPrimaryCiId(res.checkInId);
               setMg({
                 guestName: res.guestName || '',
                 companyName: res.companyName || '',
                 gstNumber: res.gstNumber || '',
                 mobile: res.mobile || '',
                 email: res.email || '',
                 address: res.address || '',
                 city: res.city || '',
                 state: res.state || '',
                 pinCode: res.pinCode || '',
                 country: res.country || '',
                 gstType: res.gstType || 'Excluding',
                 billTo: res.billTo || 'Individual',
                 extraPerson: res.extraPerson || 0
               });
               setDiscountPercent(res.discountPercent || 0); 
            }

            setQueuedCis(prev => [...prev, res]);
            const roomsArr = (res.roomNumbers||'').split(',').map(r=>r.trim()).filter(Boolean);
            setSelectedRoomsMap(prev => ({...prev, [res.checkInId]: roomsArr}));
            
            google.script.run.withSuccessHandler(orders=>{
              setFetching(false);
              const activeOrders = Array.isArray(orders) ? orders.filter(o => o.checkInId === res.checkInId && o.status === 'Active') : [];
              setFoodOrdersMap(prev => ({...prev, [res.checkInId]: activeOrders}));
              setSelectedOrdersMap(prev => ({...prev, [res.checkInId]: activeOrders.map(o => o.orderId)}));
              
              // Recalculate advance
              setAdvanceToApply(prev => prev + (parseFloat(res.advancePaid)||0));
            }).withFailureHandler(e=>{setFetching(false);Swal.fire('Error',e.message,'error')}).getAllFoodOrders();
            
          } else {
            setFetching(false);
            Swal.fire({icon:'info',title:'Not Found',text:'No active check-in found for room #'+selectedRoomNo});
          }
        }).withFailureHandler(e=>{setFetching(false);Swal.fire({icon:'error',text:e.message});}).getCheckInByRoomNo(selectedRoomNo);
      };

      const handleSetPrimary = (ciId) => {
        setPrimaryCiId(ciId);
        const pCi = queuedCis.find(ci => ci.checkInId === ciId);
        if (pCi) {
          setMg({
            guestName: pCi.guestName || '',
            companyName: pCi.companyName || '',
            gstNumber: pCi.gstNumber || '',
            mobile: pCi.mobile || '',
            email: pCi.email || '',
            address: pCi.address || '',
            city: pCi.city || '',
            state: pCi.state || '',
            pinCode: pCi.pinCode || '',
            country: pCi.country || '',
            gstType: pCi.gstType || 'Excluding',
            billTo: pCi.billTo || 'Individual',
            extraPerson: pCi.extraPerson || 0
          });
        }
      };

      const removeQueued = (ciId) => {
        const removedCi = queuedCis.find(c => c.checkInId === ciId);
        if (removedCi) {
          setAdvanceToApply(prev => Math.max(0, prev - (parseFloat(removedCi.advancePaid)||0)));
        }
        setQueuedCis(prev => prev.filter(c => c.checkInId !== ciId));
        setFoodOrdersMap(prev => { const n = {...prev}; delete n[ciId]; return n; });
        setSelectedRoomsMap(prev => { const n = {...prev}; delete n[ciId]; return n; });
        setSelectedOrdersMap(prev => { const n = {...prev}; delete n[ciId]; return n; });
        if (primaryCiId === ciId) setPrimaryCiId(null);
      };

      const selectAllItems = () => {
        const newRoomsMap = {};
        const newOrdersMap = {};
        queuedCis.forEach(ci => {
          newRoomsMap[ci.checkInId] = (ci.roomNumbers || '').split(',').map(r=>r.trim()).filter(Boolean);
          newOrdersMap[ci.checkInId] = (foodOrdersMap[ci.checkInId] || []).map(o => o.orderId);
        });
        setSelectedRoomsMap(newRoomsMap);
        setSelectedOrdersMap(newOrdersMap);
      };

      const selectRoomsOnly = () => {
        const newRoomsMap = {};
        queuedCis.forEach(ci => {
          newRoomsMap[ci.checkInId] = (ci.roomNumbers || '').split(',').map(r=>r.trim()).filter(Boolean);
        });
        setSelectedRoomsMap(newRoomsMap);
        setSelectedOrdersMap({});
      };

      const selectFoodOnly = () => {
        const newOrdersMap = {};
        queuedCis.forEach(ci => {
          newOrdersMap[ci.checkInId] = (foodOrdersMap[ci.checkInId] || []).map(o => o.orderId);
        });
        setSelectedRoomsMap({});
        setSelectedOrdersMap(newOrdersMap);
      };

      const toggleRoom = (ciId, rn) => {
        setSelectedRoomsMap(prev => {
          const arr = prev[ciId] || [];
          if (arr.includes(rn)) return {...prev, [ciId]: arr.filter(x => x !== rn)};
          return {...prev, [ciId]: [...arr, rn]};
        });
      };

      const toggleOrder = (ciId, oid) => {
        setSelectedOrdersMap(prev => {
          const arr = prev[ciId] || [];
          if (arr.includes(oid)) return {...prev, [ciId]: arr.filter(x => x !== oid)};
          return {...prev, [ciId]: [...arr, oid]};
        });
      };

      const toggleOrderGroup = (ciId, orderIdsArray) => {
        setSelectedOrdersMap(prev => {
          const arr = prev[ciId] || [];
          const allSelected = orderIdsArray.every(id => arr.includes(id));
          if (allSelected) {
            return {...prev, [ciId]: arr.filter(id => !orderIdsArray.includes(id))};
          } else {
            const missing = orderIdsArray.filter(id => !arr.includes(id));
            return {...prev, [ciId]: [...arr, ...missing]};
          }
        });
      };

      const doAdvancedCheckout = (isPreview = false) => {
        if(queuedCis.length === 0){Swal.fire({icon:'warning',text:'Add at least one check-in to the queue.'});return;}
        if(!primaryCiId){Swal.fire({icon:'warning',text:'Please select a primary billing guest from the queue.'});return;}
        
        let hasAnySelection = false;
        const selectedRoomsFlat = [];
        for (const ciId in selectedRoomsMap) {
          if (selectedRoomsMap[ciId] && selectedRoomsMap[ciId].length > 0) {
             hasAnySelection = true;
             selectedRoomsMap[ciId].forEach(rn => selectedRoomsFlat.push({ checkInId: ciId, roomNo: rn }));
          }
        }
        
        const selectedOrdersFlat = [];
        for (const ciId in selectedOrdersMap) {
          if (selectedOrdersMap[ciId] && selectedOrdersMap[ciId].length > 0) {
             hasAnySelection = true;
             selectedOrdersMap[ciId].forEach(oid => selectedOrdersFlat.push(oid));
          }
        }

        if (!hasAnySelection) {
           Swal.fire({icon:'warning',text:'Please select at least one room or POS order to checkout.'});return;
        }
        
        setSaving(true);Swal.fire({title: isPreview ? 'Generating Preview...' : 'Processing Advanced Checkout...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
        
        const payload = {
          checkOutDate, checkOutTime, paymentMode:payMode, paymentStatus:payStatus, amountPaid:parseFloat(amtPaid)||0,
          discountPercent, advanceToApply: parseFloat(advanceToApply)||0, isPreview
        };
        
        const primaryGuestData = { ...mg };

        google.script.run.withSuccessHandler(res=>{
          Swal.close();setSaving(false);
          if(res.success){
            if (isPreview) {
               if(res.invoiceData){setInv(res.invoiceData);}
            } else {
               Swal.fire({icon:'success',title:'Checkout Complete!',text:res.message,timer:2500,showConfirmButton:false});
               if(res.invoiceData){setInv(res.invoiceData);}
               setQueuedCis([]); setFoodOrdersMap({}); setPrimaryCiId(null);
               setSelectedRoomsMap({}); setSelectedOrdersMap({});
            }
          }else Swal.fire({icon:'error',text:res.message});
        }).withFailureHandler(e=>{Swal.close();setSaving(false);Swal.fire({icon:'error',text:e.message});}).processAdvancedCheckout(primaryGuestData, selectedRoomsFlat, selectedOrdersFlat, payload);
      };

      const totalAdvanceAvailable = queuedCis.reduce((sum, ci) => sum + (parseFloat(ci.advancePaid) || 0), 0);

      return(<div className="data-section"><div className="section-header"><h2><i className="fas fa-object-group"></i> Advanced Checkout</h2></div>
        <div className="form-group">
          <label>Select Rooms to Checkout *</label>
          {activeRooms.length===0 ? (
            <div style={{color:'#e74c3c',fontSize:'14px',marginBottom:'15px'}}><i className="fas fa-info-circle"></i> No active check-ins found. Check in guests first from the Check-In page.</div>
          ) : (
            <div style={{display: 'flex', flexWrap: 'wrap', gap: '15px', marginBottom: '15px'}}>
              {Object.entries(activeRooms.reduce((acc, rm) => {
                if (!acc[rm.checkInId]) acc[rm.checkInId] = { guestName: rm.guestName, rooms: [] };
                acc[rm.checkInId].rooms.push(rm);
                return acc;
              }, {})).map(([ciId, group]) => (
                <div key={ciId} style={{display: 'flex', flexDirection: 'column', gap: '5px', padding: '10px', backgroundColor: '#f9f9f9', border: '1px solid #ddd', borderRadius: '6px', minWidth: '150px'}}>
                  <div style={{fontWeight: 'bold', color: 'var(--navy-primary)', fontSize: '14px', marginBottom: '5px'}}>
                    <i className="fas fa-user-circle"></i> {group.guestName} <span style={{fontSize: '12px', color: '#888', fontWeight: 'normal'}}>(ID: {ciId})</span>
                  </div>
                  <div style={{display:'flex', flexWrap:'wrap', gap:'15px'}}>
                    {group.rooms.map(rm => {
                       const isQueued = queuedCis.some(ci => ci.checkInId === ciId);
                       return (
                         <button key={rm.roomNo} type="button"
                           onClick={() => fetchRoom(rm.roomNo.toString())}
                           disabled={isQueued || fetching}
                           className={`btn ${isQueued ? 'btn-secondary' : 'btn-primary'}`}
                           style={{padding: '6px 12px', fontSize: '13px', borderRadius: '4px', opacity: isQueued ? 0.5 : 1, cursor: isQueued ? 'not-allowed' : 'pointer'}}>
                           #{rm.roomNo}
                         </button>
                       );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {queuedCis.length > 0 && <>
          <div style={{background:'#fff',padding:'20px',borderRadius:'4px',border:'1px solid #ddd',marginBottom:'20px'}}>
            <h4 style={{color:'var(--navy-primary)',marginBottom:'15px'}}><i className="fas fa-shopping-cart"></i> Checkout Cart (Select items to pay)</h4>
            <div style={{display:'flex', gap:'10px', marginBottom:'15px'}}>
              <button className="btn btn-sm btn-secondary" onClick={selectAllItems}>Combined Bill (Select All)</button>
              <button className="btn btn-sm btn-secondary" onClick={selectRoomsOnly}>Room Bill Only</button>
              <button className="btn btn-sm btn-secondary" onClick={selectFoodOnly}>Food & Services Only</button>
            </div>
            
            <div style={{display:'flex', gap:'20px', overflowX:'auto', paddingBottom:'10px'}}>
              {queuedCis.map(ci => {
                 const ciRooms = (ci.roomNumbers||'').split(',').map(r=>r.trim()).filter(Boolean);
                 const ciOrders = foodOrdersMap[ci.checkInId] || [];

                 const roomStats = {};
                 if (ci.staySegments && ci.staySegments.length > 0) {
                   ci.staySegments.forEach(seg => {
                     const segRooms = (seg.roomNos || '').split(',').map(r => r.trim()).filter(Boolean);
                     const rCount = segRooms.length || 1;
                     segRooms.forEach(rNo => {
                       if (!roomStats[rNo]) roomStats[rNo] = { nights: 0, rent: 0 };
                       roomStats[rNo].nights += seg.nights;
                       roomStats[rNo].rent += (seg.segmentTotal / rCount);
                     });
                   });
                 }

                 return (
                   <div key={ci.checkInId} style={{minWidth:'300px', flex:'0 0 auto', background:'#f8f9fa', border:'1px solid #dee2e6', borderRadius:'4px', padding:'15px'}}>
                     <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'10px'}}>
                       <div>
                         <label style={{display:'flex',alignItems:'center',gap:'5px',fontWeight:'bold',color:'var(--navy-primary)',cursor:'pointer'}}>
                           <input type="radio" name="primaryGuest" checked={primaryCiId === ci.checkInId} onChange={() => handleSetPrimary(ci.checkInId)} style={{width:'16px',height:'16px',margin:0}}/>
                           Master Bill Guest
                         </label>
                         <div style={{fontSize:'12px', color:'#555', marginTop:'4px'}}>[{ci.checkInId}] {ci.guestName}</div>
                       </div>
                       <button className="btn btn-secondary" style={{padding:'4px 8px',margin:0,fontSize:'11px'}} onClick={() => removeQueued(ci.checkInId)}><i className="fas fa-times"></i></button>
                     </div>
                     
                     <div style={{marginTop:'15px'}}>
                       <strong>Rooms</strong>
                       {ciRooms.map(rn => (
                         <label key={rn} style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'5px',cursor:'pointer',fontSize:'13px'}}>
                           <input type="checkbox" checked={(selectedRoomsMap[ci.checkInId]||[]).includes(rn)} onChange={()=>toggleRoom(ci.checkInId, rn)} />
                           Room {rn} ({roomStats[rn]?.nights || ci.nightsStayed || 1} Nights - Rent: {fmtCur(roomStats[rn]?.rent || ci.liveRoomRent || 0)})
                         </label>
                       ))}
                     </div>
                     
                     <div style={{marginTop:'10px', padding:'10px', background:'#e9ecef', borderRadius:'4px'}}>
                       <strong style={{fontSize:'12px', color:'#666'}}>Past Room Shifts</strong>
                       {Object.keys(roomStats).filter(rn => !ciRooms.includes(rn)).length === 0 && <div style={{fontSize:'11px', color:'#999', marginTop:'2px'}}>No past shifts recorded.</div>}
                       {Object.keys(roomStats).filter(rn => !ciRooms.includes(rn)).map(rn => (
                         <div key={rn} style={{fontSize:'12px', color:'#555', marginTop:'4px'}}>
                           <i className="fas fa-history" style={{marginRight:'5px', color:'#999'}}></i>
                           Room {rn}: {roomStats[rn].nights} Nights - Rent: {fmtCur(roomStats[rn].rent)}
                         </div>
                       ))}
                     </div>

                     <div style={{marginTop:'15px'}}>
                       <strong>POS Orders</strong>
                       {ciOrders.length===0 && <div style={{fontSize:'12px',color:'#888',marginTop:'5px'}}>No pending orders</div>}
                       {Object.entries(ciOrders.reduce((acc, o) => {
                         const rNo = o.roomNo || 'Unknown';
                         if (!acc[rNo]) acc[rNo] = { total: 0, orderIds: [] };
                         acc[rNo].total += parseFloat(o.amount) || 0;
                         acc[rNo].orderIds.push(o.orderId);
                         return acc;
                       }, {})).map(([rNo, group]) => {
                         const isGroupSelected = group.orderIds.every(id => (selectedOrdersMap[ci.checkInId] || []).includes(id));
                         return (
                           <label key={rNo} style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'5px',cursor:'pointer',fontSize:'13px'}}>
                             <input type="checkbox" checked={isGroupSelected} onChange={() => toggleOrderGroup(ci.checkInId, group.orderIds)} />
                             Room {rNo} Food - {fmtCur(group.total)}
                           </label>
                         );
                       })}
                     </div>
                   </div>
                 )
              })}
            </div>
            {!primaryCiId && <p style={{color:'var(--danger)',fontSize:'13px',marginTop:'10px'}}><i className="fas fa-exclamation-triangle"></i> Please select a primary guest to generate the master invoice.</p>}
          </div>

          <div className="checkout-bill-section">
            <h4><i className="fas fa-calculator"></i> Master Checkout Options</h4>

    function InvoicePreviewModal({invoice, onClose, sysSettings}){
      const convertInvoiceToHotelData = (inv, settings) => {
        const items = (() => { try { return JSON.parse(typeof inv.items === 'string' ? inv.items : '[]'); } catch(e) { return []; } })();

        let roomsAmt = 0;
        let extraBedAmt = 0;
        let foodBevAmt = 0;
        let laundryAmt = 0;

        items.forEach(it => {
           let desc = (it.description || '').toLowerCase();
           let type = (it.type || '').toLowerCase();

           if (type === 'room') {
             roomsAmt += parseFloat(it.amount) || 0;
           } else if (desc.includes('extra bed') || type === 'extrabed') {
             extraBedAmt += parseFloat(it.amount) || 0;
           } else if (desc.includes('laundry')) {
             laundryAmt += parseFloat(it.amount) || 0;
           } else {
             foodBevAmt += parseFloat(it.amount) || 0;
           }
        });

        const dayTotal = roomsAmt + extraBedAmt + foodBevAmt + laundryAmt;
        const subtotal = parseFloat(inv.subTotal) || 0;
        const discountAmount = parseFloat(inv.discount) || 0;
        const discountPercent = subtotal > 0 ? (discountAmount / subtotal) * 100 : 0;
        const gstAmount = parseFloat(inv.gstAmount) || 0;
        const gstPercent = parseFloat(inv.gstPercent) || 0;

        // Infer GST Type: if GST amount > 0, it's 'Excluding', else 'Including' or 'None'
        let gstType = 'None';
        let sgstPercent = 0;
        let cgstPercent = 0;
        if (inv.gstEnabled && gstAmount > 0) {
            gstType = 'Excluding';
            sgstPercent = gstPercent / 2;
            cgstPercent = gstPercent / 2;
        } else if (inv.gstEnabled) {
            gstType = 'Including';
        }

        const syntheticDayByDay = [{
           date: (inv.createdDate || new Date().toISOString()).split('T')[0],
           rooms: roomsAmt,
           extraBed: extraBedAmt,
           foodBev: foodBevAmt,
           laundry: laundryAmt,
           dayTotal: dayTotal,
           grandTotal: dayTotal
        }];

        return {
           billNumber: inv.invoiceId,
           checkInId: '',
           hotelName: settings?.hotelName || 'Hill View Eco Retreat',
           hotelAddress: settings?.hotelAddress || '',
           hotelPhone: settings?.hotelPhone || '',
           hotelEmail: settings?.hotelEmail || '',
           hotelTIN: settings?.hotelTIN || '',
           hotelLogo: settings?.logoUrl || '',
           currency: inv.currency || 'MVR',
           guestName: inv.guestName || '',
           companyName: '',
           gstNumber: inv.customerTIN || '',
           mobile: inv.phone || '',
           email: inv.email || '',
           address: '',
           checkInDate: inv.createdDate || '',
           checkInTime: '',
           checkOutDate: inv.dueDate || '',
           checkOutTime: '',
           roomNumbers: items.filter(i => i.type === 'room').map(i => i.roomType || 'Room').join(', '),
           roomTypes: '',
           numberOfRooms: items.filter(i => i.type === 'room').reduce((acc, it) => acc + (parseInt(it.quantity) || 1), 0),
           pax: 1,
           extraPerson: 0,
           foodPlan: 'None',
           billTo: 'Individual',
           nights: items.filter(i => i.type === 'room').reduce((acc, it) => acc + (parseInt(it.nights) || 0), 0) || 1,
           dailyRoomRate: roomsAmt,
           totalRoomRent: roomsAmt,
           subtotal: subtotal,
           discountPercent: discountPercent,
           discountAmount: discountAmount,
           gstType: gstType,
           sgstPercent: sgstPercent,
           cgstPercent: cgstPercent,
           sgstAmount: gstAmount / 2,
           cgstAmount: gstAmount / 2,
           billAmount: parseFloat(inv.totalAmount) || 0,
           advancePaid: 0,
           netAmount: parseFloat(inv.totalAmount) || 0,
           paymentMode: 'Cash',
           amountPaid: 0,
           balance: parseFloat(inv.totalAmount) || 0,
           dayByDay: syntheticDayByDay,
           notes: inv.notes || ''
        };
      };

      return <HotelInvoiceModal data={convertInvoiceToHotelData(invoice, sysSettings)} onClose={onClose} />;
    }

          {data:null,title:'Actions',orderable:false,className:'all',responsivePriority:1,render:()=>'<button class="action-icon view-icon" data-action="view"><i class="fas fa-eye"></i></button><button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button><button class="action-icon" data-action="email" title="Email Invoice" style="color:#0074D9"><i class="fas fa-envelope"></i></button><button class="action-icon" data-action="pdf" style="color:#001f3f"><i class="fas fa-file-pdf"></i></button><button class="action-icon" data-action="drive" style="color:#34a853"><i class="fas fa-cloud-upload-alt"></i></button><button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>'}
        ],pageLength:10,lengthMenu:[[10,25,50,-1],[10,25,50,"All"]],responsive:true,dom:'Blfrtip',buttons:[
          {extend:'csv',text:'<i class="fas fa-file-csv"></i> CSV',exportOptions:{columns:':not(:last-child)'}},{extend:'pdf',text:'<i class="fas fa-file-pdf"></i> PDF',exportOptions:{columns:':not(:last-child)'}},{extend:'print',text:'<i class="fas fa-print"></i> Print',exportOptions:{columns:':not(:last-child)'}}],order:[[2,'desc']]});
        $('#invT').off('click','.action-icon').on('click','.action-icon',function(){const a=$(this).data('action');const tr=$(this).closest('tr');const rd=t.row(tr.hasClass('child')?tr.prev():tr).data();
          if(a==='view')setPreview(rd);else if(a==='edit'){setEdit(rd);setShow(true);}else if(a==='email')emailInv(rd);else if(a==='pdf')downloadInvoicePdf(rd);else if(a==='drive')savePdfToDriveHelper(rd);else if(a==='delete')delRec(rd);});
        tRef.current=t;}catch(e){console.error(e);}},150);};
      const delRec=(rec)=>{Swal.fire({icon:'warning',title:'Delete?',text:'Delete invoice '+rec.invoiceId+'?',showCancelButton:true,confirmButtonColor:'#ea4335',confirmButtonText:'Delete'}).then(r=>{if(r.isConfirmed)google.script.run.withSuccessHandler(res=>{if(res.success){Swal.fire({icon:'success',text:res.message,timer:2000,showConfirmButton:false});setTimeout(load,100);}else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>Swal.fire({icon:'error',text:e.message})).deleteInvoice(rec.rowIndex);});};
      const emailInv=(inv)=>{if(!inv.email)return Swal.fire({icon:'warning',text:'No email address on this invoice.'});Swal.fire({icon:'question',title:'Email Invoice?',text:'Send invoice '+inv.invoiceId+' to '+inv.email+'?',showCancelButton:true,confirmButtonColor:'#001f3f',confirmButtonText:'Send Email'}).then(r=>{if(r.isConfirmed){Swal.fire({title:'Sending email...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});google.script.run.withSuccessHandler(res=>{Swal.close();if(res.success)Swal.fire({icon:'success',text:res.message,timer:3000,showConfirmButton:false});else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>{Swal.close();Swal.fire({icon:'error',text:e.message});}).emailInvoice(inv.invoiceId);}});};
      useEffect(()=>{if(!tRef.current||recs.length===0)return;$.fn.dataTable.ext.search=[];
        $.fn.dataTable.ext.search.push(function(s,d,idx){const row=recs[idx];if(!row)return true;if(filters.dateFrom){const dt=new Date(row.createdDate);if(dt<new Date(filters.dateFrom))return false;}if(filters.dateTo){const dt=new Date(row.createdDate);if(dt>new Date(filters.dateTo+'T23:59:59'))return false;}return true;});
        if(filters.status)tRef.current.column(4).search('^'+filters.status+'$',true,false);else tRef.current.column(4).search('');
        tRef.current.draw();},[filters]);
      const clearF=()=>{setFilters({dateFrom:'',dateTo:'',status:''});if(tRef.current){$.fn.dataTable.ext.search=[];tRef.current.columns().search('').draw();}};
      return(<div className="data-section"><div className="section-header"><h2><i className="fas fa-file-invoice-dollar"></i> Invoices</h2><button className="btn btn-success" onClick={()=>{setEdit(null);setShow(true);}}><i className="fas fa-plus"></i> New Invoice</button></div>
        {!ld&&<div className="filters-section"><div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={clearF}><i className="fas fa-times-circle"></i> Clear</button></div><div className="filters-grid">
          <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> From</label><input type="date" className="filter-input" value={filters.dateFrom} onChange={e=>setFilters({...filters,dateFrom:e.target.value})}/></div>
          <div className="filter-group"><label><i className="fas fa-calendar-alt"></i> To</label><input type="date" className="filter-input" value={filters.dateTo} onChange={e=>setFilters({...filters,dateTo:e.target.value})}/></div>
          <div className="filter-group"><label><i className="fas fa-check-circle"></i> Status</label><select className="filter-input" value={filters.status} onChange={e=>setFilters({...filters,status:e.target.value})}><option value="">All</option><option>Draft</option><option>Sent</option><option>Paid</option><option>Overdue</option><option>Cancelled</option></select></div>
        </div></div>}
        {ld&&<TableSkeleton rows={5} columns={7}/>}<div style={{display:ld?'none':'block'}}><table id="invT" className="display" style={{width:'100%'}}></table></div>
        {show&&<InvoiceModal invoice={edit} onClose={()=>{setShow(false);setEdit(null);}} onSave={load} user={user}/>}
        {preview&&<InvoicePreviewModal invoice={preview} onClose={()=>setPreview(null)} sysSettings={sysSettings} />}
      </div>);
    }

    function MenuItemModal({editItem, onClose, onSave}){
      const [fd, setFd] = useState({
        itemName: editItem ? editItem.itemName : '',
        foodCategory: editItem ? editItem.foodCategory : 'Lunch',
        defaultPrice: editItem ? editItem.defaultPrice : ''
      });
      const [sv, setSv] = useState(false);
      const CATEGORIES = ['Breakfast', 'Lunch', 'Dinner', 'Snacks', 'FoodBeverage'];
      const CAT_LABELS = {Breakfast: 'Breakfast', Lunch: 'Lunch', Dinner: 'Dinner', Snacks: 'Snacks', FoodBeverage: 'Other Food & Beverage'};

      const submit = (e) => {
        e.preventDefault();
        setSv(true);
        onSave({...fd, rowIndex: editItem ? editItem.rowIndex : null}, () => setSv(false));
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <h3><i className="fas fa-utensils"></i> {editItem ? 'Edit Menu Item' : 'Add Menu Item'}</h3>
              <button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button>
            </div>
            <div className="modal-body">
              <form onSubmit={submit}>
                <div className="form-group">
                  <label>Item Name *</label>
                  <input value={fd.itemName} onChange={e=>setFd({...fd, itemName: e.target.value})} required />
                </div>
                <div className="form-group">
                  <label>Category *</label>
                  <select value={fd.foodCategory} onChange={e=>setFd({...fd, foodCategory: e.target.value})}>
                    {CATEGORIES.map(c => <option key={c} value={c}>{CAT_LABELS[c]}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label>Default Price ({APP_CURRENCY}) *</label>
                  <input type="number" step="0.01" min="0" value={fd.defaultPrice} onChange={e=>setFd({...fd, defaultPrice: e.target.value})} required />
                </div>
                <div className="form-actions">
                  <button type="submit" className="btn btn-primary" disabled={sv}>{sv?<><i className="fas fa-spinner fa-spin"></i> Saving...</>:<><i className="fas fa-save"></i> Save</>}</button>
                  <button type="button" className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

    function SettingsView({user, role}){
      const isAdmin = role === 'admin';
      const [activeSettingsTab, setActiveSettingsTab] = useState('profile');
      const [ld,setLd]=useState(true);const [sv,setSv]=useState(false);
      const [fd,setFd]=useState({hotelName:'Hill View Eco Retreat',hotelAddress:'',hotelPhone:'',hotelEmail:'',hotelTIN:'',logoUrl:'',gstDefaultPercent:16});
      useEffect(()=>{google.script.run.withSuccessHandler(r=>{setLd(false);if(r.success){setFd({...fd,...r.data});}}).withFailureHandler(()=>setLd(false)).getSettings();},[]);
      const save=()=>{setSv(true);google.script.run.withSuccessHandler(r=>{setSv(false);if(r.success){Swal.fire({icon:'success',text:r.message,timer:2000,showConfirmButton:false});}else Swal.fire({icon:'error',text:r.message});}).withFailureHandler(e=>{setSv(false);Swal.fire({icon:'error',text:e.message});}).updateSettings(fd);};
      const uploadLogo=(e)=>{const file=e.target.files[0];if(!file)return;if(file.size>2*1024*1024)return Swal.fire({icon:'warning',text:'Max 2MB file size.'});
        const reader=new FileReader();reader.onload=()=>{const b64=reader.result.split(',')[1];Swal.fire({title:'Uploading...',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
          google.script.run.withSuccessHandler(r=>{Swal.close();if(r.success){setFd({...fd,logoUrl:r.logoUrl,logoFileId:r.fileId});Swal.fire({icon:'success',text:'Logo uploaded!',timer:2000,showConfirmButton:false});}else Swal.fire({icon:'error',text:r.message});}).withFailureHandler(e=>{Swal.close();Swal.fire({icon:'error',text:e.message});}).uploadLogo(b64,file.name,file.type);};reader.readAsDataURL(file);};
      
      // Profile Tab States
      const [oldP,setOldP]=useState('');const [newP,setNewP]=useState('');const [confP,setConfP]=useState('');const [profileSv,setProfileSv]=useState(false);
      const submitProfile=(e)=>{e.preventDefault();if(newP!==confP){Swal.fire({icon:'error',text:'New passwords do not match'});return;}if(newP.length<4){Swal.fire({icon:'warning',text:'Password must be at least 4 characters'});return;}setProfileSv(true);
        google.script.run.withSuccessHandler(r=>{setProfileSv(false);if(r.success){Swal.fire({icon:'success',text:r.message,timer:2000,showConfirmButton:false});setOldP('');setNewP('');setConfP('');}else Swal.fire({icon:'error',text:r.message});}).withFailureHandler(e=>{setProfileSv(false);Swal.fire({icon:'error',text:e.message});}).changePassword(user,oldP,newP);};
        
      // Users Tab States
      const [usersLd,setUsersLd]=useState(true);const [showUserModal,setShowUserModal]=useState(false);const [editUser,setEditUser]=useState(null);const tRef=useRef(null);

      // Menu Tab States
      const [menuLd, setMenuLd] = useState(true);
      const [menuItems, setMenuItems] = useState([]);
      const [showMenuModal, setShowMenuModal] = useState(false);
      const [editMenu, setEditMenu] = useState(null);
      const menuTRef = useRef(null);

      useEffect(() => {
        if(activeSettingsTab === 'menu' && isAdmin) loadMenu();
        return () => { if(menuTRef.current) try{ menuTRef.current.destroy(); }catch(e){} };
      }, [activeSettingsTab, isAdmin]);

      const loadMenu = () => {
        setMenuLd(true);
        google.script.run.withSuccessHandler(r => {
          setMenuLd(false);
          const data = Array.isArray(r) ? r : [];
          setMenuItems(data);
          initMenuT(data);
        }).withFailureHandler(e => {
          setMenuLd(false);
          Swal.fire({icon:'error', text:e.message});
        }).getAllMenuItems();
      };

      const initMenuT = (data) => {
        if(menuTRef.current){ try{ menuTRef.current.destroy(); menuTRef.current=null; $('#menuT').empty(); }catch(e){} }
        setTimeout(()=>{
          try {
            const t = $('#menuT').DataTable({
              data,
              destroy: true,
              columns: [
                {data: 'itemName', title: 'Item Name'},
                {data: 'foodCategory', title: 'Category'},
                {data: 'defaultPrice', title: 'Default Price', render: d => fmtCur(d)},
                {data: null, title: 'Actions', orderable: false, className: 'all', responsivePriority: 1, render: () => '<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button><button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>'}
              ],
              pageLength: 10,
              responsive: true,
              dom: 'Blfrtip',
              buttons: [
                {extend: 'csv', text: '<i class="fas fa-file-csv"></i> CSV', exportOptions: {columns: ':not(:last-child)'}},
                {extend: 'pdf', text: '<i class="fas fa-file-pdf"></i> PDF', exportOptions: {columns: ':not(:last-child)'}},
                {extend: 'print', text: '<i class="fas fa-print"></i> Print', exportOptions: {columns: ':not(:last-child)'}}
              ]
            });
            $('#menuT').off('click', '.action-icon').on('click', '.action-icon', function(){
              const a = $(this).data('action');
              const tr = $(this).closest('tr');
              const rowData = t.row(tr.hasClass('child') ? tr.prev() : tr).data();
              if(a === 'edit'){
                setEditMenu(rowData);
                setShowMenuModal(true);
              } else if(a === 'delete'){
                delMenuItem(rowData);
              }
            });
            menuTRef.current = t;
          } catch(e) { console.error(e); }
        }, 150);
      };

      const saveMenuItem = (data, resetSv) => {
        if(data.rowIndex) {
          google.script.run.withSuccessHandler(r=>{
            resetSv();
            if(r.success){ Swal.fire({icon:'success', text:r.message, timer:1500, showConfirmButton:false}); setShowMenuModal(false); setEditMenu(null); loadMenu(); }
            else Swal.fire({icon:'error', text:r.message});
          }).withFailureHandler(e=>{ resetSv(); Swal.fire({icon:'error', text:e.message}); }).updateMenuItem(data.rowIndex, data.itemName, data.foodCategory, data.defaultPrice);
        } else {
          google.script.run.withSuccessHandler(r=>{
            resetSv();
            if(r.success){ Swal.fire({icon:'success', text:r.message, timer:1500, showConfirmButton:false}); setShowMenuModal(false); loadMenu(); }
            else Swal.fire({icon:'error', text:r.message});
          }).withFailureHandler(e=>{ resetSv(); Swal.fire({icon:'error', text:e.message}); }).addMenuItem(data.itemName, data.foodCategory, data.defaultPrice);
        }
      };

      const delMenuItem = (row) => {
        Swal.fire({title: 'Delete Menu Item?', text: "This action cannot be undone.", icon: 'warning', showCancelButton: true, confirmButtonColor: '#e74c3c', confirmButtonText: 'Yes, delete it!'}).then((res) => {
          if(res.isConfirmed) {
            Swal.fire({title: 'Deleting...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
            google.script.run.withSuccessHandler(r => {
              if(r.success) { Swal.fire({icon:'success', text:r.message, timer:1500, showConfirmButton:false}); loadMenu(); }
              else { Swal.fire({icon:'error', text:r.message}); }
            }).withFailureHandler(e => { Swal.fire({icon:'error', text:e.message}); }).deleteMenuItem(row.rowIndex);
          }
        });
      };
      const [filters,setFilters]=useState({role:''});
      useEffect(()=>{if(activeSettingsTab==='users'&&isAdmin)loadUsers();return()=>{if(tRef.current)try{tRef.current.destroy();}catch(e){}};},[activeSettingsTab,isAdmin]);
      useEffect(()=>{if(!tRef.current)return;if(filters.role)tRef.current.column(1).search('^'+filters.role+'$',true,false);else tRef.current.column(1).search('');tRef.current.draw();},[filters]);
      const clearF=()=>{setFilters({role:''});if(tRef.current){tRef.current.columns().search('').draw();}};
      const loadUsers=()=>{setUsersLd(true);google.script.run.withSuccessHandler(r=>{setUsersLd(false);if(r&&r.error){Swal.fire({icon:'error',text:r.error});return;}initT(Array.isArray(r)?r:[]);}).withFailureHandler(e=>{setUsersLd(false);Swal.fire({icon:'error',text:e.message});}).getAllUsers();};
      const initT=(data)=>{if(tRef.current){try{tRef.current.destroy();tRef.current=null;$('#usrT').empty();}catch(e){}}
        setTimeout(()=>{try{const t=$('#usrT').DataTable({data,destroy:true,columns:[
          {data:'username',title:'Username'},{data:'role',title:'Role',render:d=>`<span class="role-badge ${d==='admin'?'role-admin':'role-user'}">${d}</span>`},
          {data:null,title:'Actions',orderable:false,className:'all',responsivePriority:1,render:()=>'<button class="action-icon edit-icon" data-action="edit"><i class="fas fa-edit"></i></button><button class="action-icon delete-icon" data-action="delete"><i class="fas fa-trash"></i></button>'}
        ],pageLength:10,responsive:true,dom:'Blfrtip',buttons:[
          {extend:'csv',text:'<i class="fas fa-file-csv"></i> CSV',exportOptions:{columns:':not(:last-child)'}},
          {extend:'pdf',text:'<i class="fas fa-file-pdf"></i> PDF',exportOptions:{columns:':not(:last-child)'}},
          {extend:'print',text:'<i class="fas fa-print"></i> Print',exportOptions:{columns:':not(:last-child)'}}
        ],order:[[0,'asc']]});
        $('#usrT').off('click','.action-icon').on('click','.action-icon',function(){const a=$(this).data('action');const tr=$(this).closest('tr');const rd=t.row(tr.hasClass('child')?tr.prev():tr).data();if(a==='edit'){setEditUser(rd);setShowUserModal(true);}else delUser(rd);});
        tRef.current=t;}catch(e){console.error(e);}},150);};
      const delUser=(u)=>{Swal.fire({icon:'warning',title:'Delete User?',text:'Delete '+u.username+'?',showCancelButton:true,confirmButtonColor:'#ea4335',confirmButtonText:'Delete'}).then(r=>{if(r.isConfirmed)google.script.run.withSuccessHandler(res=>{if(res.success){Swal.fire({icon:'success',text:res.message,timer:2000,showConfirmButton:false});setTimeout(loadUsers,100);}else Swal.fire({icon:'error',text:res.message});}).withFailureHandler(e=>Swal.fire({icon:'error',text:e.message})).deleteUser(u.rowIndex);});};

      if(ld)return <div><DashboardCardSkeleton/></div>;
      return(<div className="data-section">
        <div className="section-header"><h2><i className="fas fa-cog"></i> Settings</h2></div>
        
        <div className="tabs-header" style={{display:'flex', gap:'10px', marginBottom:'20px'}}>
          <button className={`btn ${activeSettingsTab==='profile'?'btn-primary':'btn-secondary'}`} onClick={()=>setActiveSettingsTab('profile')}><i className="fas fa-user-circle"></i> My Profile</button>
          {isAdmin&&<button className={`btn ${activeSettingsTab==='hotel'?'btn-primary':'btn-secondary'}`} onClick={()=>setActiveSettingsTab('hotel')}><i className="fas fa-hotel"></i> Hotel Config</button>}
          {isAdmin&&<button className={`btn ${activeSettingsTab==='users'?'btn-primary':'btn-secondary'}`} onClick={()=>setActiveSettingsTab('users')}><i className="fas fa-users"></i> User Management</button>}
            {isAdmin && <button className={`btn ${activeSettingsTab==='menu'?'btn-primary':'btn-secondary'}`} onClick={()=>setActiveSettingsTab('menu')}><i className="fas fa-utensils"></i> Menu Config</button>}
        </div>

        {activeSettingsTab === 'profile' && (
          <div className="settings-form" style={{maxWidth:'500px'}}>
            <p style={{marginBottom:'20px',color:'#666'}}>Logged in as: <strong>{user}</strong></p>
            <form onSubmit={submitProfile}>
              <div className="form-group"><label>Current Password *</label><input type="password" value={oldP} onChange={e=>setOldP(e.target.value)} required/></div>
              <div className="form-group"><label>New Password *</label><input type="password" value={newP} onChange={e=>setNewP(e.target.value)} required/></div>
              <div className="form-group"><label>Confirm New Password *</label><input type="password" value={confP} onChange={e=>setConfP(e.target.value)} required/></div>
              <button type="submit" className="btn btn-primary" disabled={profileSv}>{profileSv?<><i className="fas fa-spinner fa-spin"></i> Changing...</>:<><i className="fas fa-key"></i> Change Password</>}</button>
            </form>
          </div>
        )}

        {activeSettingsTab === 'hotel' && isAdmin && (
          <div className="settings-form">
            <div className="form-grid">
              <div className="form-group"><label>Hotel Name</label><input value={fd.hotelName} onChange={e=>setFd({...fd,hotelName:e.target.value})}/></div>
              <div className="form-group"><label>Hotel Phone</label><input value={fd.hotelPhone} onChange={e=>setFd({...fd,hotelPhone:e.target.value})}/></div>
              <div className="form-group"><label>Hotel Email</label><input type="email" value={fd.hotelEmail} onChange={e=>setFd({...fd,hotelEmail:e.target.value})}/></div>
              <div className="form-group"><label>Hotel TIN</label><input value={fd.hotelTIN} onChange={e=>setFd({...fd,hotelTIN:e.target.value})}/></div>
            </div>
            <div className="form-group"><label>Hotel Address</label><textarea rows="2" value={fd.hotelAddress} onChange={e=>setFd({...fd,hotelAddress:e.target.value})}/></div>

            <div className="form-grid">
              <div className="form-group"><label>Default GST %</label><input type="number" step="0.01" value={fd.gstDefaultPercent} onChange={e=>setFd({...fd,gstDefaultPercent:e.target.value})}/></div>

            <button className="btn btn-primary" onClick={save} disabled={sv}>{sv?<><i className="fas fa-spinner fa-spin"></i> Saving...</>:<><i className="fas fa-save"></i> Save Settings</>}</button>
          </div>
        )}

        {activeSettingsTab === 'users' && isAdmin && (
          <div className="settings-form">
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'15px'}}><button className="btn btn-success" onClick={()=>{setEditUser(null);setShowUserModal(true);}}><i className="fas fa-plus"></i> Add User</button></div>
            {!usersLd&&<div className="filters-section"><div className="filters-header"><h3><i className="fas fa-filter"></i> Filters</h3><button className="btn btn-secondary btn-sm" onClick={clearF}><i className="fas fa-times-circle"></i> Clear All</button></div><div className="filters-grid">
              <div className="filter-group"><label><i className="fas fa-user-shield"></i> Role</label><select className="filter-input" value={filters.role} onChange={e=>setFilters({...filters,role:e.target.value})}><option value="">All Roles</option><option value="admin">Admin</option><option value="user">User</option></select></div>
            </div></div>}
            {usersLd&&<TableSkeleton rows={5} columns={3}/>}<div style={{display:usersLd?'none':'block'}}><table id="usrT" className="display" style={{width:'100%'}}></table></div>
            {showUserModal&&<UserModal editUser={editUser} onClose={()=>{setShowUserModal(false);setEditUser(null);}} onSave={loadUsers}/>}
          </div>
        )}

        {activeSettingsTab === 'menu' && isAdmin && (
          <div className="settings-form">
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'15px'}}>
              <button className="btn btn-success" onClick={()=>{setEditMenu(null);setShowMenuModal(true);}}>
                <i className="fas fa-plus"></i> Add Menu Item
              </button>
            </div>
            {menuLd && <TableSkeleton rows={5} columns={4}/>}
            <div style={{display: menuLd ? 'none' : 'block'}}>
              <table id="menuT" className="display" style={{width:'100%'}}></table>
            </div>
            {showMenuModal && <MenuItemModal editItem={editMenu} onClose={()=>{setShowMenuModal(false);setEditMenu(null);}} onSave={saveMenuItem}/>}
          </div>
        )}

      </div>);
    }


    function BottomNav({activeMenu,setActiveMenu,role,onLogout}){
      const adm=role==='admin';
      const items=adm?[
        {k:'dashboard',i:'fa-chart-line',l:'Home'},
        {k:'bookings',i:'fa-calendar-check',l:'Bookings'},
                {k:'checkout',i:'fa-sign-out-alt',l:'Checkout'},
        {k:'more',i:'fa-ellipsis-h',l:'More'}
      ]:[
        {k:'bookings',i:'fa-calendar-check',l:'Bookings'},
        {k:'calendar',i:'fa-calendar-alt',l:'Calendar'},
                {k:'settings',i:'fa-cog',l:'Settings'}
      ];
      const [showMore,setShowMore]=useState(false);
      const moreItems=adm?[
        {k:'calendar',i:'fa-calendar-alt',l:'Calendar'},
        {k:'checkin',i:'fa-door-open',l:'Check-In'},
        {k:'restaurant',i:'fa-utensils',l:'Restaurant'},
                {k:'invoices',i:'fa-file-invoice-dollar',l:'Invoices'},
        {k:'customers',i:'fa-address-book',l:'Customers'},
        {k:'settings',i:'fa-cog',l:'Settings'},
        {k:'_logout',i:'fa-power-off',l:'Logout'}
      ]:[];
      const handleClick=(k)=>{if(k==='more'){setShowMore(!showMore);return;}if(k==='_logout'){onLogout();return;}setActiveMenu(k);setShowMore(false);};
      return(<>
        {showMore&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:'60px',background:'rgba(0,0,0,0.3)',zIndex:995}} onClick={()=>setShowMore(false)}></div>}
        {showMore&&<div style={{position:'fixed',bottom:'60px',left:0,right:0,background:'white',zIndex:996,boxShadow:'0 -4px 20px rgba(0,0,0,0.15)',borderTop:'2px solid var(--navy-primary)',padding:'10px',maxHeight:'50vh',overflowY:'auto'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
            {moreItems.map(m=>(<button key={m.k} onClick={()=>handleClick(m.k)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'6px',padding:'14px 8px',border:m.k==='_logout'?'1px solid #ea4335':'1px solid #eee',borderRadius:'8px',background:activeMenu===m.k?'#f0f4ff':m.k==='_logout'?'#fff5f5':'#fafbfc',cursor:'pointer',color:m.k==='_logout'?'#ea4335':activeMenu===m.k?'var(--navy-primary)':'#555',fontWeight:activeMenu===m.k?'700':'500',fontSize:'12px',touchAction:'manipulation'}}>
              <i className={`fas ${m.i}`} style={{fontSize:'20px'}}></i>{m.l}
            </button>))}
          </div>
        </div>}
        <div className="bottom-nav"><div className="bottom-nav-inner">
          {items.map(m=>(<button key={m.k} className={`bottom-nav-item ${activeMenu===m.k||(m.k==='more'&&showMore)?'active':''}`} onClick={()=>handleClick(m.k)}><i className={`fas ${m.i}`}></i><span>{m.l}</span></button>))}
        </div></div>
      </>);
    }

    function BookingDetailModal({booking,onClose}){
      const ci=new Date(booking.checkIn);const co=new Date(booking.checkOut);
      let nights=Math.ceil((co-ci)/(1000*3600*24));if(nights<1)nights=1;
      return(<div className="modal-overlay" onClick={onClose}><div className="modal" style={{maxWidth:'500px'}} onClick={e=>e.stopPropagation()}><div className="modal-header"><h3><i className="fas fa-calendar-check"></i> Booking Details</h3><button className="close-btn" onClick={onClose}><i className="fas fa-times"></i></button></div><div className="modal-body">
        <div className="invoice-detail-grid">
          <p><strong>Ticket:</strong> {booking.ticketId}</p>
          <p><strong>Status:</strong> <span className={'status-badge '+statusCls(booking.status)}>{booking.status}</span></p>
          <p><strong>Guest:</strong> {booking.guestName}</p>
          <p><strong>Room:</strong> #{booking.roomNo}</p>
          <p><strong>Phone:</strong> {booking.phone||'-'}</p>
          <p><strong>Email:</strong> {booking.email||'-'}</p>
          <p><strong>Check-in:</strong> {fmtDate(booking.checkIn)}</p>
          <p><strong>Check-out:</strong> {fmtDate(booking.checkOut)}</p>
          <p><strong>Nights:</strong> {nights}</p>
          <p><strong>Rate/Night:</strong> {fmtCur(booking.roomRate)}</p>
          <p><strong>Discount:</strong> {fmtCur(booking.discount)}</p>
          <p><strong>Tax:</strong> {fmtCur(booking.tax)}</p>
          <p><strong>Payment:</strong> {booking.paymentMethod}</p>
          <p><strong>Total:</strong> <span style={{fontWeight:700,color:'var(--navy-primary)'}}>{fmtCur(booking.totalAmount)}</span></p>
        </div>
        <div className="form-actions" style={{justifyContent:'center'}}><button className="btn btn-secondary" onClick={onClose}><i className="fas fa-times"></i> Close</button></div>
      </div></div></div>);
    }

    function CalendarView({user,role}){
      const [loading,setLoading]=useState(true);const [bookings,setBookings]=useState([]);
      const [currentDate,setCurrentDate]=useState(new Date());const [selectedBooking,setSelectedBooking]=useState(null);
      const isAdmin=role==='admin';

      useEffect(()=>{loadBookings();},[]);
      const loadBookings=()=>{setLoading(true);google.script.run.withSuccessHandler(r=>{setLoading(false);const data=Array.isArray(r)?r:[];const filtered=isAdmin?data:data.filter(b=>b.email===user);setBookings(filtered);}).withFailureHandler(e=>{setLoading(false);Swal.fire({icon:'error',text:e.message});}).getAllBookings();};

      const prevMonth=()=>{const d=new Date(currentDate);d.setMonth(d.getMonth()-1);setCurrentDate(d);};
      const nextMonth=()=>{const d=new Date(currentDate);d.setMonth(d.getMonth()+1);setCurrentDate(d);};
      const goToday=()=>setCurrentDate(new Date());

      const year=currentDate.getFullYear();const month=currentDate.getMonth();
      const firstDay=new Date(year,month,1).getDay();
      const daysInMonth=new Date(year,month+1,0).getDate();
      const daysInPrevMonth=new Date(year,month,0).getDate();

      const cells=[];
      for(let i=firstDay-1;i>=0;i--)cells.push({day:daysInPrevMonth-i,isOther:true,date:new Date(year,month-1,daysInPrevMonth-i)});
      for(let d=1;d<=daysInMonth;d++)cells.push({day:d,isOther:false,date:new Date(year,month,d)});
      const rem=7-(cells.length%7);if(rem<7)for(let i=1;i<=rem;i++)cells.push({day:i,isOther:true,date:new Date(year,month+1,i)});

      const getBookingsForDate=(date)=>{
        const dayStart=new Date(date.getFullYear(),date.getMonth(),date.getDate());
        const dayEnd=new Date(dayStart);dayEnd.setDate(dayEnd.getDate()+1);
        return bookings.filter(b=>{if(!b.checkIn||!b.checkOut)return false;const ci=new Date(b.checkIn);const co=new Date(b.checkOut);
        // Exclude the actual check-out day block from occupancy maps
        const actualCheckoutStart = new Date(co.getFullYear(), co.getMonth(), co.getDate());
        return ci < dayEnd && actualCheckoutStart > dayStart;});
      };

      const today=new Date();
      const isToday=(date)=>date.getDate()===today.getDate()&&date.getMonth()===today.getMonth()&&date.getFullYear()===today.getFullYear();
      const isPast=(date)=>{const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());const t=new Date(today.getFullYear(),today.getMonth(),today.getDate());return d<t;};
      const isFuture=(date)=>{const d=new Date(date.getFullYear(),date.getMonth(),date.getDate());const t=new Date(today.getFullYear(),today.getMonth(),today.getDate());return d>t;};
      const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
      const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

      const showMoreBookings=(dayBookings,dateStr)=>{
        const html=dayBookings.map(bk=>'<div style="padding:8px 12px;border-bottom:1px solid #eee;cursor:pointer;display:flex;align-items:center;gap:8px" class="swal-bk-row" data-ticket="'+bk.ticketId+'"><span class="status-badge '+(bk.status==='Booked'?'status-booked':'status-checkedout')+'">'+bk.status+'</span> <strong>#'+bk.roomNo+'</strong> '+bk.guestName+'</div>').join('');
        Swal.fire({title:'Bookings on '+dateStr,html:'<div style="max-height:300px;overflow-y:auto">'+html+'</div>',showConfirmButton:false,showCloseButton:true,width:420,didOpen:()=>{document.querySelectorAll('.swal-bk-row').forEach(el=>{el.addEventListener('click',()=>{const tid=el.getAttribute('data-ticket');const bk=dayBookings.find(b=>b.ticketId===tid);if(bk){Swal.close();setSelectedBooking(bk);}});});}});
      };

      if(loading)return <div className="data-section"><TableSkeleton rows={5} columns={7}/></div>;

      return(<div className="data-section"><div className="calendar-container">
        <div className="calendar-header"><h3><i className="fas fa-calendar-alt" style={{marginRight:'10px'}}></i>{monthNames[month]} {year}</h3>
          <div className="calendar-nav"><button onClick={prevMonth}><i className="fas fa-chevron-left"></i></button><button onClick={goToday}>Today</button><button onClick={nextMonth}><i className="fas fa-chevron-right"></i></button></div>
        </div>
        <div className="calendar-grid">
          {dayNames.map(d=><div key={d} className="calendar-day-header">{d}</div>)}
          {cells.map((cell,idx)=>{
            const dayBookings=cell.isOther?[]:getBookingsForDate(cell.date);
            const cls=['calendar-cell'];if(cell.isOther)cls.push('other-month');if(!cell.isOther&&isToday(cell.date)){cls.push('today');cls.push('current-date');}else if(!cell.isOther&&isPast(cell.date))cls.push('past-date');else if(!cell.isOther&&isFuture(cell.date))cls.push('future-date');
            const maxVisible=4;
            const dateStr=fmtDate(cell.date.toISOString());
            return(<div key={idx} className={cls.join(' ')}><div className="calendar-date">{cell.day}</div>
              {dayBookings.slice(0,maxVisible).map((bk,i)=>(<div key={bk.ticketId+'-'+i} className={'calendar-booking '+(bk.status==='Booked'?'cal-booked':'cal-checkedout')} onClick={()=>setSelectedBooking(bk)} title={bk.guestName+' - Room #'+bk.roomNo}>#{bk.roomNo} {(bk.guestName||'').split(' ')[0]}</div>))}
              {dayBookings.length>maxVisible&&<div style={{fontSize:'10px',color:'var(--navy-accent)',padding:'2px 6px',cursor:'pointer',fontWeight:'600'}} onClick={()=>showMoreBookings(dayBookings,dateStr)}>+{dayBookings.length-maxVisible} more</div>}
            </div>);
          })}
        </div>
      </div>
      {selectedBooking&&<BookingDetailModal booking={selectedBooking} onClose={()=>setSelectedBooking(null)}/>}
      </div>);
    }

    function MainContent({activeMenu,user,role,onLogout}){
      switch(activeMenu){
        case 'dashboard': return <DashboardView user={user}/>;
        case 'bookings': return <BookingsView user={user} role={role}/>;
        case 'calendar': return <CalendarView user={user} role={role}/>;
        case 'checkin': return <CheckInView user={user} role={role}/>;
        case 'checkout': return <CheckoutView user={user}/>;
        case 'restaurant': return <RestaurantView user={user}/>;
        case 'customers': return <CustomersView user={user}/>;
                case 'invoices': return <InvoicesView user={user}/>;
        case 'settings': return <SettingsView user={user} role={role} onLogout={onLogout}/>;
                default: return null;
      }
    }

    function Dashboard({user,role,onLogout}){
      const [am,setAm]=useState(role==='admin'?'dashboard':'bookings');
      const [so,setSo]=useState(false);
      return(<div className="app-container"><Sidebar activeMenu={am} setActiveMenu={setAm} role={role} user={user} onLogout={onLogout} isOpen={so} setIsOpen={setSo}/><div className="main-content"><div className="header"><div style={{display:'flex',alignItems:'center',gap:'10px'}}><button className="hamburger" onClick={()=>setSo(!so)}><i className="fas fa-bars"></i></button><h1><i className="fas fa-hotel"></i> Hill View Eco Retreat</h1></div><div style={{fontSize:'14px',color:'#666'}}>Welcome, {user}</div></div><MainContent activeMenu={am} user={user} role={role} onLogout={onLogout}/></div><BottomNav activeMenu={am} setActiveMenu={setAm} role={role} onLogout={onLogout}/></div>);
    }

    function App(){
      const getSession=()=>{try{const s=localStorage.getItem('hotel_session');if(!s)return null;return JSON.parse(s);}catch(e){localStorage.removeItem('hotel_session');return null;}};
      const saved=getSession();
      const [li,setLi]=useState(!!saved);const [cu,setCu]=useState(saved?saved.user:null);const [ur,setUr]=useState(saved?saved.role:null);

      const doLogout=()=>{localStorage.removeItem('hotel_session');setLi(false);setCu(null);setUr(null);};

      const handleLogin=(u,r)=>{const session={user:u,role:r};localStorage.setItem('hotel_session',JSON.stringify(session));setLi(true);setCu(u);setUr(r);};

      return(<div>{!li?<LoginPage onLogin={handleLogin}/>:<Dashboard user={cu} role={ur} onLogout={doLogout}/>}</div>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
